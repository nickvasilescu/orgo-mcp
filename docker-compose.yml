# ==============================================================================
# docker-compose.yml - Local Development and Testing
# ==============================================================================
version: "3.9"

services:
  orgo-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: orgo-mcp-server

    ports:
      - "${PORT:-8000}:${PORT:-8000}"

    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - PORT=${PORT:-8000}
      - NODE_ENV=production

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://localhost:'+(process.env.PORT||8000)+'/health',s=>{process.exit(s.statusCode===200?0:1)});r.on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    security_opt:
      - no-new-privileges:true
    read_only: true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==============================================================================
# Usage:
#   docker-compose up --build
#   docker-compose logs -f
#   curl http://localhost:8000/health
# ==============================================================================
