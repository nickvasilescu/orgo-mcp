# ==============================================================================
# fly.toml - Fly.io Application Configuration
# ==============================================================================

app = "orgo-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
